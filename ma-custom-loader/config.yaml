name: "Music Assistant (Custom Loader)"
description: "The music library manager of your dreams. Pure loader version - supports loading custom plugins from /share."
url: "https://github.com/neqq3/ma_custom_loader"
version: "2.7.11"
upstream_version: "2.7.11"
slug: "ma-custom-loader"
ingress: true
ingress_port: 8094
arch:
  - aarch64
  - amd64
init: false
map:
  - "share:rw"
  - "media:rw"
options:
  log_level: "info"
  strict_provider_injection: false
  import_official_config: false
  auto_detect_official_slug: true
  official_slug: ""
  force_overwrite_on_import: false
schema:
  log_level: list(info|debug|warning|error|critical)
  strict_provider_injection: bool
  import_official_config: bool
  auto_detect_official_slug: bool
  official_slug: str
  force_overwrite_on_import: bool
ports:
  8095/tcp: 8095
webui: "http://[HOST]:[PORT:8095]"
host_network: true
startup: application
boot: manual
hassio_role: manager
hassio_api: true
homeassistant_api: true
panel_icon: "mdi:music-box-multiple"
panel_title: "Music Assistant"
panel_admin: false
image: "ghcr.io/neqq3/ma-custom-loader-{arch}"
