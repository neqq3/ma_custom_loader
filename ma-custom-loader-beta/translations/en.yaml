configuration:
  log_level:
    name: Log Level
    description: Controls loader logging verbosity.
  strict_provider_injection:
    name: Strict Provider Injection
    description: If enabled, startup fails when MA providers directory cannot be resolved.
  import_official_config:
    name: Import Official MA Config
    description: Run one-time migration to import official MA configuration into this loader.
  auto_detect_official_slug:
    name: Auto Detect Official MA Slug
    description: If official_slug is invalid, try Supervisor API and filesystem scan automatically.
  official_slug:
    name: Official MA Slug
    description: Official MA slug, for example core_music_assistant or d6faf732_music_assistant.
  force_overwrite_on_import:
    name: Force Overwrite During Import
    description: Allow replacing current /data during import. Use only after backup.
