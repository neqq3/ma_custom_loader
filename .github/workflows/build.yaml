name: Build and Publish Add-on

on:
  push:
    branches: [ "main" ]
    paths:
      - 'ma-custom-loader/**'
      - 'ma-custom-loader-beta/**'
      - 'ma-provider-subscriber/**'
      - 'docs/**'
      - 'scripts/**'
      - '.github/workflows/**'
  schedule:
    - cron: '0 2 * * *' # Run daily at 2 AM
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: neqq3/ma-custom-loader
  IMAGE_NAME_BETA: neqq3/ma-custom-loader-beta
  IMAGE_NAME_SUBSCRIBER: neqq3/ma-provider-subscriber
  # Aliyun ACR image names
  ALIYUN_IMAGE_NAME: ma-custom-loader
  ALIYUN_IMAGE_NAME_BETA: ma-custom-loader-beta
  ALIYUN_IMAGE_NAME_SUBSCRIBER: ma-provider-subscriber

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      ma_loader: ${{ steps.filter.outputs.ma_loader }}
      ma_loader_beta: ${{ steps.filter.outputs.ma_loader_beta }}
      subscriber: ${{ steps.filter.outputs.subscriber }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ma_loader:
              - 'ma-custom-loader/**'
              - 'scripts/**'
            ma_loader_beta:
              - 'ma-custom-loader-beta/**'
            subscriber:
              - 'ma-provider-subscriber/**'
              - 'docs/**'

  build:
    needs: changes
    if: github.event_name == 'schedule' || needs.changes.outputs.ma_loader == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    strategy:
      matrix:
        arch: [aarch64, amd64]
        include:
          - arch: aarch64
            platform: linux/aarch64
          - arch: amd64
            platform: linux/amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync add-on version with upstream (scheduled/manual only)
        id: sync
        if: github.event_name != 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/sync_upstream_version.sh

      - name: Read add-on version
        id: version
        run: |
          VERSION="$(sed -n 's/^version: "\(.*\)"/\1/p' ma-custom-loader/config.yaml)"
          if [ -z "$VERSION" ]; then
            echo "ERROR: failed to read version from ma-custom-loader/config.yaml" >&2
            exit 1
          fi
          BUILD_FROM="$(sed -n 's/^ARG BUILD_FROM=\(.*\)$/\1/p' ma-custom-loader/Dockerfile)"
          if [ -z "$BUILD_FROM" ]; then
            echo "ERROR: failed to read BUILD_FROM from ma-custom-loader/Dockerfile" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_from=$BUILD_FROM" >> "$GITHUB_OUTPUT"
          echo "Resolved stable version: $VERSION"
          echo "Resolved stable BUILD_FROM: $BUILD_FROM"

      - name: Validate stable version metadata consistency
        run: |
          CONFIG_VERSION="$(sed -n 's/^version: "\(.*\)"/\1/p' ma-custom-loader/config.yaml)"
          LABEL_VERSION="$(sed -n 's/.*io\.hass\.version="\(.*\)"/\1/p' ma-custom-loader/Dockerfile)"
          if [ -z "$CONFIG_VERSION" ] || [ -z "$LABEL_VERSION" ]; then
            echo "ERROR: failed to read CONFIG_VERSION or LABEL_VERSION" >&2
            exit 1
          fi
          if [ "$CONFIG_VERSION" != "$LABEL_VERSION" ]; then
            echo "ERROR: version mismatch: config.yaml=$CONFIG_VERSION, Dockerfile label=$LABEL_VERSION" >&2
            exit 1
          fi
          echo "Stable version metadata is consistent: $CONFIG_VERSION"
      - name: Preflight upstream compatibility check
        if: github.event_name != 'schedule' || steps.sync.outputs.changed == 'true'
        run: |
          docker pull "${{ steps.version.outputs.build_from }}"
          docker run --rm --entrypoint sh "${{ steps.version.outputs.build_from }}" -c "command -v mass"
          docker run --rm --entrypoint python3 "${{ steps.version.outputs.build_from }}" -c "import importlib; pkg = importlib.import_module('music_assistant.providers'); paths = list(getattr(pkg, '__path__', [])); assert paths, 'music_assistant.providers has no __path__'; print('providers_dir:', paths[0])"

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        if: github.event_name != 'schedule' || steps.sync.outputs.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ma-custom-loader
          file: ma-custom-loader/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.arch }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.arch }}:${{ steps.version.outputs.version }},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.arch }}:${{ github.sha }}

      # ---- Aliyun ACR push (domestic mirror) ----
      - name: Check Aliyun ACR configuration
        id: aliyun_check
        run: |
          if [ -n "$ALIYUN_REGISTRY" ] && [ -n "$ALIYUN_NAMESPACE" ] && [ -n "$ALIYUN_REGISTRY_USER" ] && [ -n "$ALIYUN_REGISTRY_PASSWORD" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          ALIYUN_REGISTRY: ${{ secrets.ALIYUN_REGISTRY }}
          ALIYUN_NAMESPACE: ${{ secrets.ALIYUN_NAMESPACE }}
          ALIYUN_REGISTRY_USER: ${{ secrets.ALIYUN_REGISTRY_USER }}
          ALIYUN_REGISTRY_PASSWORD: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Log in to Aliyun ACR
        if: (github.event_name != 'schedule' || steps.sync.outputs.changed == 'true') && steps.aliyun_check.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USER }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Push image to Aliyun ACR
        if: (github.event_name != 'schedule' || steps.sync.outputs.changed == 'true') && steps.aliyun_check.outputs.enabled == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ma-custom-loader
          file: ma-custom-loader/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/${{ env.ALIYUN_IMAGE_NAME }}-${{ matrix.arch }}:latest
            ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/${{ env.ALIYUN_IMAGE_NAME }}-${{ matrix.arch }}:${{ steps.version.outputs.version }}

      - name: Commit synced version metadata
        if: steps.sync.outputs.changed == 'true' && matrix.arch == 'amd64'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ma-custom-loader/config.yaml ma-custom-loader/Dockerfile
          if git diff --cached --quiet; then
            echo "No metadata changes to commit."
            exit 0
          fi
          git commit -m "chore: sync upstream Music Assistant v${{ steps.version.outputs.version }} [skip ci]"
          git push

  build_subscriber:
    needs: changes
    if: github.event_name != 'schedule' && needs.changes.outputs.subscriber == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        arch: [aarch64, amd64]
        include:
          - arch: aarch64
            platform: linux/aarch64
            build_from: ghcr.io/home-assistant/aarch64-base:latest
          - arch: amd64
            platform: linux/amd64
            build_from: ghcr.io/home-assistant/amd64-base:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read subscriber version
        id: version
        run: |
          VERSION="$(sed -n 's/^version: "\(.*\)"/\1/p' ma-provider-subscriber/config.yaml)"
          if [ -z "$VERSION" ]; then
            echo "ERROR: failed to read version from ma-provider-subscriber/config.yaml" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved subscriber version: $VERSION"

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push subscriber image
        uses: docker/build-push-action@v5
        with:
          context: ma-provider-subscriber
          file: ma-provider-subscriber/Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_SUBSCRIBER }}-${{ matrix.arch }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME_SUBSCRIBER }}-${{ matrix.arch }}:${{ steps.version.outputs.version }},${{ env.REGISTRY }}/${{ env.IMAGE_NAME_SUBSCRIBER }}-${{ matrix.arch }}:${{ github.sha }}

      # ---- Aliyun ACR push (domestic mirror) ----
      - name: Check Aliyun ACR configuration (subscriber)
        id: aliyun_check
        run: |
          if [ -n "$ALIYUN_REGISTRY" ] && [ -n "$ALIYUN_NAMESPACE" ] && [ -n "$ALIYUN_REGISTRY_USER" ] && [ -n "$ALIYUN_REGISTRY_PASSWORD" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          ALIYUN_REGISTRY: ${{ secrets.ALIYUN_REGISTRY }}
          ALIYUN_NAMESPACE: ${{ secrets.ALIYUN_NAMESPACE }}
          ALIYUN_REGISTRY_USER: ${{ secrets.ALIYUN_REGISTRY_USER }}
          ALIYUN_REGISTRY_PASSWORD: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Log in to Aliyun ACR (subscriber)
        if: steps.aliyun_check.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USER }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Push subscriber image to Aliyun ACR
        if: steps.aliyun_check.outputs.enabled == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ma-provider-subscriber
          file: ma-provider-subscriber/Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
          push: true
          tags: |
            ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/${{ env.ALIYUN_IMAGE_NAME_SUBSCRIBER }}-${{ matrix.arch }}:latest
            ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/${{ env.ALIYUN_IMAGE_NAME_SUBSCRIBER }}-${{ matrix.arch }}:${{ steps.version.outputs.version }}

  build_beta:
    needs: changes
    if: github.event_name != 'schedule' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.ma_loader_beta == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        arch: [aarch64, amd64]
        include:
          - arch: aarch64
            platform: linux/aarch64
          - arch: amd64
            platform: linux/amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read beta add-on version
        id: version
        run: |
          VERSION="$(sed -n 's/^version: "\(.*\)"/\1/p' ma-custom-loader-beta/config.yaml)"
          if [ -z "$VERSION" ]; then
            echo "ERROR: failed to read version from ma-custom-loader-beta/config.yaml" >&2
            exit 1
          fi
          BUILD_FROM="$(sed -n 's/^ARG BUILD_FROM=\(.*\)$/\1/p' ma-custom-loader-beta/Dockerfile)"
          if [ -z "$BUILD_FROM" ]; then
            echo "ERROR: failed to read BUILD_FROM from ma-custom-loader-beta/Dockerfile" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_from=$BUILD_FROM" >> "$GITHUB_OUTPUT"
          echo "Resolved beta version: $VERSION"

      - name: Preflight upstream compatibility check
        run: |
          docker pull "${{ steps.version.outputs.build_from }}"
          docker run --rm --entrypoint sh "${{ steps.version.outputs.build_from }}" -c "command -v mass"
          docker run --rm --entrypoint python3 "${{ steps.version.outputs.build_from }}" -c "import importlib; pkg = importlib.import_module('music_assistant.providers'); paths = list(getattr(pkg, '__path__', [])); assert paths, 'music_assistant.providers has no __path__'; print('providers_dir:', paths[0])"

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push beta Docker image
        uses: docker/build-push-action@v5
        with:
          context: ma-custom-loader-beta
          file: ma-custom-loader-beta/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BETA }}-${{ matrix.arch }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BETA }}-${{ matrix.arch }}:${{ steps.version.outputs.version }},${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BETA }}-${{ matrix.arch }}:${{ github.sha }}

      # ---- Aliyun ACR push (domestic mirror) ----
      - name: Check Aliyun ACR configuration (beta)
        id: aliyun_check
        run: |
          if [ -n "$ALIYUN_REGISTRY" ] && [ -n "$ALIYUN_NAMESPACE" ] && [ -n "$ALIYUN_REGISTRY_USER" ] && [ -n "$ALIYUN_REGISTRY_PASSWORD" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          ALIYUN_REGISTRY: ${{ secrets.ALIYUN_REGISTRY }}
          ALIYUN_NAMESPACE: ${{ secrets.ALIYUN_NAMESPACE }}
          ALIYUN_REGISTRY_USER: ${{ secrets.ALIYUN_REGISTRY_USER }}
          ALIYUN_REGISTRY_PASSWORD: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Log in to Aliyun ACR (beta)
        if: steps.aliyun_check.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USER }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Push beta image to Aliyun ACR
        if: steps.aliyun_check.outputs.enabled == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ma-custom-loader-beta
          file: ma-custom-loader-beta/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/${{ env.ALIYUN_IMAGE_NAME_BETA }}-${{ matrix.arch }}:latest
            ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/${{ env.ALIYUN_IMAGE_NAME_BETA }}-${{ matrix.arch }}:${{ steps.version.outputs.version }}

  publish_domestic:
    needs: [changes, build, build_beta, build_subscriber]
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    steps:
      - name: Check GitCode configuration
        id: gitcode_check
        run: |
          if [ -n "$GITCODE_TOKEN" ] && [ -n "$GITCODE_REPO" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
          GITCODE_REPO: ${{ secrets.GITCODE_REPO }}

      - name: Checkout upstream
        if: steps.gitcode_check.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          path: upstream

      - name: Sync and publish to GitCode
        if: steps.gitcode_check.outputs.enabled == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          GITCODE_REPO="${{ secrets.GITCODE_REPO }}"
          GITCODE_USER=$(echo "$GITCODE_REPO" | cut -d'/' -f1)
          GITCODE_URL="https://${GITCODE_USER}:${{ secrets.GITCODE_TOKEN }}@gitcode.com/${GITCODE_REPO}.git"

          git clone "$GITCODE_URL" domestic || {
            echo "Clone failed or empty repository. Initializing structure..."
            mkdir domestic
            cd domestic
            git init
            git remote add origin "$GITCODE_URL"
            cd ..
          }

          cd domestic
          TARGET_BRANCH="$(git ls-remote --symref origin HEAD 2>/dev/null | awk '/^ref:/ {sub("refs/heads/","",$2); print $2; exit}')"
          if [ -z "$TARGET_BRANCH" ]; then
            TARGET_BRANCH="main"
          fi
          git checkout -B "$TARGET_BRANCH"
          cd ..

          rsync -av --exclude='.git' --delete upstream/ domestic/

          cd domestic
          if [ -n "${{ secrets.ALIYUN_REGISTRY }}" ] && [ -n "${{ secrets.ALIYUN_NAMESPACE }}" ]; then
            sed -i "s|ghcr.io/neqq3/|${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/|g" ma-custom-loader/config.yaml
            sed -i "s|ghcr.io/neqq3/|${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/|g" ma-provider-subscriber/config.yaml
            if [ -f "ma-custom-loader-beta/config.yaml" ]; then
              sed -i "s|ghcr.io/neqq3/|${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/|g" ma-custom-loader-beta/config.yaml
            fi
            echo "Successfully replaced image domains with Aliyun ACR."
          else
            echo "Aliyun registry secrets missing. Image domains not modified."
          fi

          git add .
          if git diff --cached --quiet; then
            echo "No changes needed for domestic repo."
          else
            git commit -m "chore: release domestic edition sync from ${{ github.sha }}"
            git push origin "$TARGET_BRANCH" || git push -u origin "$TARGET_BRANCH"
          fi

